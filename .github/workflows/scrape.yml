name: Scrape UK press

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 feedparser
      
      - name: Apply schedule jitter
        if: github.event_name == 'schedule'
        run: |
          JITTER=$((RANDOM % 1800))
          echo "Sleeping ${JITTER}s before starting scrape..."
          sleep $JITTER
      
      - name: Restore previous database
        run: ls -la data/ || echo "No data dir yet"
      
      - name: Run scrape
        id: scrape
        continue-on-error: true
        run: python scraper/scrape.py
        timeout-minutes: 300
      
      - name: Run consolidation
        if: always()
        continue-on-error: true
        run: python scraper/consolidate.py
      
      - name: Print summary
        if: always()
        continue-on-error: true
        run: |
          python -c "
          import sqlite3, os
          if not os.path.exists('data/journalists.db'):
              print('No database file yet')
              exit()
          c = sqlite3.connect('data/journalists.db')
          for q, label in [
              ('SELECT COUNT(*) FROM journalists', 'Journalists'),
              ('SELECT COUNT(*) FROM bylines', 'Bylines'),
              ('SELECT COUNT(*) FROM journalist_emails', 'Emails'),
              ('SELECT COUNT(*) FROM newsroom_contacts', 'Newsroom contacts'),
          ]:
              n = c.execute(q).fetchone()[0]
              print(f'{label}: {n}')
          "
      
      - name: Copy database into dashboard folder
        if: always()
        continue-on-error: true
        run: |
          if [ -f data/journalists.db ]; then
            mkdir -p docs/data
            cp data/journalists.db docs/data/journalists.db
            echo "Copied database ($(du -h data/journalists.db | cut -f1))"
          else
            echo "No database to copy"
          fi
      
      - name: Commit and push results (binary-safe)
        # Robust binary-file commit/push.
        # Strategy: stash our scrape output, fetch latest, force-overwrite the
        # binary database files with our version (the scrape always wins for
        # the database — it's the most recent data). This avoids binary merge
        # conflicts that a normal git pull --rebase can't resolve.
        if: always()
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ ! -f data/journalists.db ]; then
            echo "No database to commit"
            exit 0
          fi
          
          # Save our scrape output to a temporary location outside the repo
          mkdir -p /tmp/scrape-output
          cp data/journalists.db /tmp/scrape-output/data.db
          if [ -f docs/data/journalists.db ]; then
            cp docs/data/journalists.db /tmp/scrape-output/docs-data.db
          fi
          
          # Get latest from remote (someone may have committed during the scrape)
          git fetch origin main
          
          # Reset our working tree to match remote, discarding any local changes
          # to other files. This ensures we don't carry along stale code edits.
          git reset --hard origin/main
          
          # Re-apply our scrape output on top
          mkdir -p data docs/data
          cp /tmp/scrape-output/data.db data/journalists.db
          if [ -f /tmp/scrape-output/docs-data.db ]; then
            cp /tmp/scrape-output/docs-data.db docs/data/journalists.db
          else
            cp /tmp/scrape-output/data.db docs/data/journalists.db
          fi
          
          git add data/journalists.db docs/data/journalists.db
          
          PARTIAL=""
          if [ "${{ steps.scrape.outcome }}" != "success" ]; then
            PARTIAL=" (partial — scrape did not complete cleanly)"
          fi
          
          # Only commit if the binary actually changed
          if git diff --cached --quiet; then
            echo "Database unchanged — nothing to commit"
            exit 0
          fi
          
          git commit -m "Daily scrape: $(date -u +%Y-%m-%d)${PARTIAL}"
          
          # Push with one retry. We've already rebased onto latest origin/main,
          # so this should succeed. If it fails (someone pushed in the few
          # seconds since), retry by rebasing on top of fresh origin/main.
          PUSH_OK=0
          for attempt in 1 2 3; do
            if git push origin main; then
              PUSH_OK=1
              break
            fi
            echo "Push attempt $attempt failed, retrying..."
            sleep $((5 * attempt))
            
            # Save our commit
            COMMIT_SHA=$(git rev-parse HEAD)
            
            # Reset hard onto fresh origin
            git fetch origin main
            git reset --hard origin/main
            
            # Re-apply just the binary files from our previous commit
            git checkout $COMMIT_SHA -- data/journalists.db docs/data/journalists.db
            git add data/journalists.db docs/data/journalists.db
            
            if git diff --cached --quiet; then
              echo "Nothing changed after rebase, giving up cleanly"
              PUSH_OK=1
              break
            fi
            
            git commit -m "Daily scrape: $(date -u +%Y-%m-%d)${PARTIAL} (retry $attempt)"
          done
          
          if [ "$PUSH_OK" -ne 1 ]; then
            echo "All push attempts failed"
            exit 1
          fi
