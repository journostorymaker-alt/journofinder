name: Scrape UK press

on:
  schedule:
    # Twice weekly: Tuesday and Friday at 02:00 UTC
    # (in BST = 03:00 UK; in GMT = 02:00 UK)
    # Designed so the dashboard is ready by 08:30 UK time.
    - cron: '0 2 * * 2,5'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 feedparser

      - name: Apply schedule jitter
        if: github.event_name == 'schedule'
        run: |
          JITTER=$((RANDOM % 1800))
          echo "Sleeping ${JITTER}s before starting scrape..."
          sleep $JITTER

      - name: Restore previous database
        run: ls -la data/ || echo "No data dir yet"

      - name: Run scrape
        id: scrape
        continue-on-error: true
        run: python scraper/scrape.py
        timeout-minutes: 180

      - name: Run consolidation
        if: always()
        continue-on-error: true
        run: python scraper/consolidate.py

      - name: Print summary
        if: always()
        continue-on-error: true
        run: |
          python -c "
          import sqlite3, os
          if not os.path.exists('data/journalists.db'):
              print('No database file yet')
              exit()
          c = sqlite3.connect('data/journalists.db')
          for q, label in [
              ('SELECT COUNT(*) FROM journalists', 'Journalists'),
              ('SELECT COUNT(*) FROM bylines', 'Bylines'),
              ('SELECT COUNT(*) FROM journalist_emails', 'Emails'),
              ('SELECT COUNT(*) FROM newsroom_contacts', 'Newsroom contacts'),
          ]:
              n = c.execute(q).fetchone()[0]
              print(f'{label}: {n}')
          "

      - name: Copy database into dashboard folder
        if: always()
        continue-on-error: true
        run: |
          if [ -f data/journalists.db ]; then
            mkdir -p docs/data
            cp data/journalists.db docs/data/journalists.db
            echo "Copied database ($(du -h data/journalists.db | cut -f1))"
          else
            echo "No database to copy"
          fi

      - name: Commit and push results (binary-safe)
        if: always()
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f data/journalists.db ]; then
            echo "No database to commit"
            exit 0
          fi

          mkdir -p /tmp/scrape-output
          cp data/journalists.db /tmp/scrape-output/data.db
          if [ -f docs/data/journalists.db ]; then
            cp docs/data/journalists.db /tmp/scrape-output/docs-data.db
          fi

          git fetch origin main
          git reset --hard origin/main

          mkdir -p data docs/data
          cp /tmp/scrape-output/data.db data/journalists.db
          if [ -f /tmp/scrape-output/docs-data.db ]; then
            cp /tmp/scrape-output/docs-data.db docs/data/journalists.db
          else
            cp /tmp/scrape-output/data.db docs/data/journalists.db
          fi

          git add data/journalists.db docs/data/journalists.db

          PARTIAL=""
          if [ "${{ steps.scrape.outcome }}" != "success" ]; then
            PARTIAL=" (partial - scrape did not complete cleanly)"
          fi

          if git diff --cached --quiet; then
            echo "Database unchanged - nothing to commit"
            exit 0
          fi

          git commit -m "Daily scrape: $(date -u +%Y-%m-%d)${PARTIAL}"

          PUSH_OK=0
          for attempt in 1 2 3; do
            if git push origin main; then
              PUSH_OK=1
              break
            fi
            echo "Push attempt $attempt failed, retrying..."
            sleep $((5 * attempt))

            COMMIT_SHA=$(git rev-parse HEAD)
            git fetch origin main
            git reset --hard origin/main
            git checkout $COMMIT_SHA -- data/journalists.db docs/data/journalists.db
            git add data/journalists.db docs/data/journalists.db

            if git diff --cached --quiet; then
              echo "Nothing changed after rebase, giving up cleanly"
              PUSH_OK=1
              break
            fi

            git commit -m "Daily scrape: $(date -u +%Y-%m-%d)${PARTIAL} (retry $attempt)"
          done

          if [ "$PUSH_OK" -ne 1 ]; then
            echo "All push attempts failed"
            exit 1
          fi
