name: Refresh Dashboard

# Manual trigger only. This workflow runs consolidation against the existing
# database (no fresh scrape) and rebuilds the dashboard.
#
# When to use this:
# - You added a line to verified_emails.txt and want to see it on the
#   dashboard without waiting for the next scheduled scrape.
# - You edited outlets.py and want the new email patterns applied right away.
# - You changed consolidate.py and want to see the new logic applied.
# - You want to test something without burning a full 3-hour scrape.
#
# What it doesn't do:
# - Doesn't fetch any new bylines (that's what the scheduled scrape is for).
# - So journalist byline counts and classifications won't reflect anything
#   new since the last scrape — only changes that come from your repo files
#   (verified_emails.txt, outlets.py, consolidate.py logic).
#
# Cost: ~2 minutes of GitHub Actions time per run.

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet beautifulsoup4 lxml requests

      - name: Verify required files are present
        run: |
          ls -la scraper/consolidate.py data/journalists.db || (
            echo "::error ::Required files missing"; exit 1
          )

      - name: Run consolidation
        working-directory: scraper
        run: python consolidate.py

      - name: Copy database into dashboard folder
        run: |
          mkdir -p docs/data
          cp data/journalists.db docs/data/journalists.db
          ls -la docs/data/

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/journalists.db docs/data/journalists.db || true
          if git diff --staged --quiet; then
            echo "No changes to commit — consolidation was a no-op."
          else
            git commit -m "Refresh dashboard (consolidation only, no scrape)"
            git push
          fi
